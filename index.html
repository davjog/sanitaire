<script>
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='carnet-sanitaire-v1';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./',]))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))))); 
  `;
  const swBlob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

// PWA Install prompt
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click',()=>{
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');});}
});
document.getElementById('dismiss-btn').addEventListener('click',()=>{
  document.getElementById('install-banner').classList.remove('show');
});
window.addEventListener('appinstalled',()=>{document.getElementById('install-banner').classList.remove('show');});
</script>

function addDays(dateStr, days) {
  if (!dateStr || !days) return "";
  const d = new Date(dateStr);
  d.setDate(d.getDate() + parseInt(days, 10));
  return d.toISOString().split("T")[0];
}

function formatDateAvecJour(d) {

  const [y, m, j] = d.split("-");

  const jour = JOURS_SEMAINE[date.getDay()];
  return `${jour} ${j}/${m}/${y}`;
}

function getDateAttenteL(r) { return r.joursAttenteL ? addDays(r.dateDebut, r.joursAttenteL) : ""; }
function getDateAttenteV(r) { return r.joursAttenteV ? addDays(r.dateDebut, r.joursAttenteV) : ""; }

function StatusBadge({ record }) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const dL = getDateAttenteL(record) ? new Date(getDateAttenteL(record)) : null;
  const dV = getDateAttenteV(record) ? new Date(getDateAttenteV(record)) : null;
  const ok = (!dL || today > dL) && (!dV || today > dV);

  const filtered = liste.filter(v =>
    v.nom.toLowerCase().includes(query.toLowerCase()) ||
    v.travail.includes(query) ||
    v.numero.includes(query)

  const select = (v) => { onChange(v); setOpen(false); setQuery(""); };

    <div style={{ position: "relative" }}>
      <div onClick={() => setOpen(o => !o)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", cursor: "pointer", justifyContent: "space-between" }}>

function MenuPanel({ open, onClose, vaches, onImportVaches, onImportSauvegarde, onExportSauvegarde, onExportVachesCSV, records, onDriveSave, onDriveRestore, driveLoading }) {
  const csvInputRef = useRef(null);
  const jsonInputRef = useRef(null);

  const handleCSV = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const text = ev.target.result;
      const lines = text.split(/\r?\n/).filter(Boolean);
      const sep = lines[0].includes(";") ? ";" : ",";
      const headers = lines[0].split(sep).map(h => h.replace(/[="]/g, "").trim().toLowerCase());
      const nomIdx = headers.findIndex(h => h.includes("nom"));
      const numIdx = headers.findIndex(h => h === "n°" || h.startsWith("n°") || h === "numero" || h.includes("national"));
      const travailIdx = headers.findIndex(h => h.includes("travail"));
      const naissIdx = headers.findIndex(h => h.includes("naissance") || h.includes("né"));
      if (nomIdx === -1) { alert("Colonne 'Nom' introuvable."); return; }
      const parsed = lines.slice(1).map(line => {
        const cols = line.split(sep).map(c => c.replace(/[="]/g, "").trim());
        return {
          nom: (cols[nomIdx] || "").toUpperCase(),
          numero: numIdx >= 0 ? cols[numIdx] : "",
          travail: travailIdx >= 0 ? cols[travailIdx] : "",
          naissance: naissIdx >= 0 ? cols[naissIdx] : "",
        };
      }).filter(v => v.nom && v.nom !== "NAN" && v.nom.length > 1);
      onImportVaches(parsed);
      onClose();
    };
    reader.readAsText(file, "latin-1");
    e.target.value = "";
  };

  const handleJSON = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.records) { onImportSauvegarde(data.records); onClose(); }
        else alert("Format de sauvegarde invalide.");
      } catch { alert("Fichier JSON invalide."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const downloadJSON = () => {
    const blob = new Blob([JSON.stringify({ version: 1, savedAt: new Date().toISOString(), records }, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `carnet-sanitaire-${new Date().toISOString().slice(0,10)}.json`; a.click();
  };

  const downloadVachesCSV = () => {
    const header = "Nom;Numéro;N° travail;Date naissance";
    const rows = vaches.map(v => `${v.nom};${v.numero};${v.travail};${v.naissance}`);
    const blob = new Blob([header + "\n" + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "troupeau.csv"; a.click();
  };

  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 200, display: "flex" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "#0006" }} />
      <div style={{ position: "relative", width: 320, background: "#fff", height: "100%", boxShadow: "4px 0 32px #0003", display: "flex", flexDirection: "column", overflowY: "auto" }}>
        <div style={{ background: "linear-gradient(135deg,#1a3a1a,#2d5a27)", padding: "20px 20px 16px", flexShrink: 0 }}>
          <div style={{ display: "flex", justifySpaceBetween: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 10, letterSpacing: 3, textTransform: "uppercase", color: "#a8d5a2", fontFamily: "sans-serif" }}>Navigation</div>
              <div style={{ color: "#fff", fontSize: 18, fontWeight: 900, marginTop: 2 }}>⚙️ Menu</div>
            </div>
            <button onClick={onClose} style={{ background: "#ffffff22", border: "none", color: "#fff", borderRadius: 8, padding: "5px 10px", cursor: "pointer", fontSize: 17 }}>✕</button>
          </div>
          <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
            <div style={{ flex: 1, background: "#ffffff18", borderRadius: 8, padding: "8px 10px", textAlign: "center", fontFamily: "sans-serif" }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: "#fff" }}>{vaches.length}</div>
              <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: "#a8d5a2" }}>Vaches</div>
            </div>
            <div style={{ flex: 1, background: "#ffffff18", borderRadius: 8, padding: "8px 10px", textAlign: "center", fontFamily: "sans-serif" }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: "#fff" }}>{records.length}</div>
              <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: "#a8d5a2" }}>Traitements</div>
            </div>
          </div>
        </div>

        <div style={{ padding: 16, flex: 1 }}>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 10, paddingBottom: 6, borderBottom: "1px solid #e8f0e8" }}>
              🐄 Troupeau
            </div>
            <div style={{ background: "#f7fbf7", borderRadius: 10, padding: "10px 12px", marginBottom: 10, maxHeight: 160, overflowY: "auto" }}>
              {vaches.length === 0 ? (
                <div style={{ color: "#8aaa8a", fontSize: 12, fontFamily: "sans-serif", textAlign: "center", padding: 8 }}>Aucune vache</div>
              ) : vaches.map(v => (
                <div key={v.numero || v.nom} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: "1px solid #eef4ee", fontFamily: "sans-serif" }}>
                  <span style={{ fontWeight: 700, fontSize: 13, color: "#1a3a1a" }}>🐄 {v.nom}</span>
                  <span style={{ fontSize: 11, color: "#7a9a7a" }}>{v.travail}</span>
                </div>
              ))}
            </div>
            <input ref={csvInputRef} type="file" accept=".csv,.txt" style={{ display: "none" }} onChange={handleCSV} />
            <button onClick={() => csvInputRef.current?.click()} style={{ width: "100%", marginBottom: 8, padding: "10px 14px", borderRadius: 9, border: "2px solid #2d5a27", background: "#fff", color: "#2d5a27", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif" }}>📥 Importer troupeau (CSV Boviclic)</button>
            <button onClick={downloadVachesCSV} style={{ width: "100%", padding: "10px 14px", borderRadius: 9, border: "1px solid #d4e8d4", background: "#f7fbf7", color: "#3a5a3a", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif" }}>📤 Exporter troupeau (CSV)</button>
          </div>

          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 10, paddingBottom: 6, borderBottom: "1px solid #e8f0e8" }}>
              💾 Sauvegarde locale
            </div>
            <input ref={jsonInputRef} type="file" accept=".json" style={{ display: "none" }} onChange={handleJSON} />
            <button onClick={() => jsonInputRef.current?.click()} style={{ width: "100%", marginBottom: 8, padding: "10px 14px", borderRadius: 9, border: "2px solid #1565c0", background: "#fff", color: "#1565c0", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif" }}>📥 Importer sauvegarde (JSON)</button>
            <button onClick={downloadJSON} style={{ width: "100%", padding: "10px 14px", borderRadius: 9, border: "1px solid #bbdefb", background: "#f3f8ff", color: "#1565c0", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif" }}>📤 Exporter sauvegarde (JSON)</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function PhotoDropZone({ onImage }) {
  const [dragging, setDragging] = useState(false);
  const [error, setError] = useState("");
  const processFile = (file) => {
    if (!file || !file.type.startsWith("image/")) { setError("Fichier non reconnu."); return; }
    const reader = new FileReader(); reader.onload = ev => onImage(ev.target.result); reader.readAsDataURL(file);
  };
  return (
    <div onDrop={e => { e.preventDefault(); setDragging(false); processFile(e.dataTransfer.files[0]); }} onDragOver={e => { e.preventDefault(); setDragging(true); }} onDragLeave={() => setDragging(false)}
      style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, padding: "28px 20px", borderRadius: 10, border: `2px dashed ${dragging ? "#2d5a27" : "#b8d8b8"}`, background: dragging ? "#e8f5e9" : "#f7fbf7", transition: "all 0.2s" }}>
      <span style={{ fontSize: 40 }}>📄</span>
      <div style={{ fontFamily: "sans-serif", fontSize: 14, color: "#3a5a3a", fontWeight: 700 }}>Glissez-déposez l'ordonnance ici</div>
    </div>
  );
}

// L'application React d'origine simplifiée pour l'exécution
function MainApp() {
  const [vaches, setVaches] = useState(() => {
    const loc = localStorage.getItem("carnet_vaches");
    return loc ? JSON.parse(loc) : VACHES_DEFAUT;
  });
  const [records, setRecords] = useState(() => {
    const loc = localStorage.getItem("carnet_records");
    return loc ? JSON.parse(loc) : [];
  });
  const [menuOpen, setMenuOpen] = useState(false);
  const [form, setForm] = useState(emptyForm);
  const [editingId, setEditingId] = useState(null);
  const [search, setSearch] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);

  useEffect(() => { localStorage.setItem("carnet_vaches", JSON.stringify(vaches)); }, [vaches]);
  useEffect(() => { localStorage.setItem("carnet_records", JSON.stringify(records)); }, [records]);

  const handleSelectVache = (v) => {
    setForm(f => ({ ...f, nomVache: v.nom, numeroVache: v.numero, travailVache: v.travail }));
  };

  const handleSelectMed = (e) => {
    const m = MEDICAMENTS.find(med => med.nom === e.target.value);
    if(m) setForm(f => ({ ...f, medicament: m.nom, joursAttenteL: m.lait, joursAttenteV: m.viande }));
    else setForm(f => ({ ...f, medicament: e.target.value }));
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.nomVache) { alert("Veuillez sélectionner une vache."); return; }
    if (editingId) {
      setRecords(records.map(r => r.id === editingId ? { ...form, id: editingId } : r));
      setEditingId(null);
    } else {
      setRecords([{ ...form, id: Date.now().toString() }, ...records]);
    }
    setForm(emptyForm);
  };

  const handleEdit = (r) => { setEditingId(r.id); setForm(r); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  const handleDelete = (id) => { setRecords(records.filter(r => r.id !== id)); setConfirmDelete(null); };

  const filteredRecords = records.filter(r => 
    r.nomVache.toLowerCase().includes(search.toLowerCase()) ||
    r.travailVache.includes(search) ||
    r.medicament.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div style={{ padding: "16px", maxWidth: 800, margin: "0 auto" }}>
      <header style={{ background: "#1a3a1a", color: "#fff", padding: "14px", borderRadius: "10px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
        <h1 style={{ fontSize: "18px" }}>🐄 Carnet Sanitaire</h1>
        <button onClick={() => setMenuOpen(true)} style={{ background: "#ffffff22", border: "none", color: "#fff", padding: "6px 12px", borderRadius: "6px", cursor: "pointer" }}>⚙️ Menu</button>
      </header>

      <MenuPanel open={menuOpen} onClose={() => setMenuOpen(false)} vaches={vaches} records={records} onImportVaches={setVaches} onImportSauvegarde={setRecords} />

      <div style={{ background: "#fff", padding: "16px", borderRadius: "10px", boxShadow: "0 2px 8px rgba(0,0,0,0.05)", marginBottom: "16px" }}>
        <h2>{editingId ? "📝 Modifier le traitement" : "➕ Nouveau traitement"}</h2>
        <form onSubmit={handleSubmit} style={{ display: "flex", flexDirection: "column", gap: "12px", marginTop: "12px" }}>
          <label style={{ fontWeight: "bold" }}>Rechercher l'animal :</label>
          <VacheSelector value={form.nomVache} onChange={handleSelectVache} vaches={vaches} />

          <label style={{ fontWeight: "bold" }}>Médicament :</label>
          <select value={form.medicament} onChange={handleSelectMed} style={{ padding: "10px", borderRadius: "6px", border: "1px solid #ccc" }}>
            <option value="">-- Sélectionner un produit --</option>
            {MEDICAMENTS.map(m => <option key={m.nom} value={m.nom}>{m.nom}</option>)}
          </select>

          <div style={{ display: "flex", gap: "10px" }}>
            <div style={{ flex: 1 }}>
              <label style={{ fontWeight: "bold" }}>Délai Lait (jours) :</label>
              <input type="number" value={form.joursAttenteL} onChange={e => setForm({ ...form, joursAttenteL: e.target.value })} style={{ width: "100%", padding: "8px", borderRadius: "6px", border: "1px solid #ccc" }} />
            </div>
            <div style={{ flex: 1 }}>
              <label style={{ fontWeight: "bold" }}>Délai Viande (jours) :</label>
              <input type="number" value={form.joursAttenteV} onChange={e => setForm({ ...form, joursAttenteV: e.target.value })} style={{ width: "100%", padding: "8px", borderRadius: "6px", border: "1px solid #ccc" }} />
            </div>
          </div>

          <label style={{ fontWeight: "bold" }}>Date de début :</label>
          <input type="date" value={form.dateDebut} onChange={e => setForm({ ...form, dateDebut: e.target.value })} required style={{ padding: "8px", borderRadius: "6px", border: "1px solid #ccc" }} />

          <button type="submit" style={{ background: "#2d5a27", color: "#fff", border: "none", padding: "12px", borderRadius: "6px", fontWeight: "bold", cursor: "pointer", fontSize: "15px" }}>
            {editingId ? "Enregistrer les modifications" : "Valider le traitement"}
          </button>
        </form>
      </div>

      <div style={{ background: "#fff", padding: "16px", borderRadius: "10px", boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>
        <h2>📋 Suivi des traitements ({filteredRecords.length})</h2>
        <input type="text" placeholder="🔍 Filtrer par vache, numéro, traitement..." value={search} onChange={e => setSearch(e.target.value)} style={{ width: "100%", padding: "10px", borderRadius: "6px", border: "1px solid #ccc", marginTop: "10px", marginBottom: "16px" }} />
        
        {filteredRecords.map(r => (
          <div key={r.id} style={{ borderBottom: "1px solid #eee", padding: "12px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontWeight: "bold", color: "#1a3a1a" }}>🐄 {r.nomVache} ({r.travailVache})</div>
              <div style={{ fontSize: "13px", color: "#555" }}>{r.medicament} — Début : {formatDate(r.dateDebut)}</div>
              <div style={{ fontSize: "11px", color: "#888", marginTop: "4px" }}>
                🥛 Libération Lait : {formatDate(getDateAttenteL(r)) || "Immédiat"} | 🥩 Viande : {formatDate(getDateAttenteV(r)) || "Immédiat"}
              </div>
            </div>
            <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
              <StatusBadge record={r} />
              <button onClick={() => handleEdit(r)} style={{ background: "#e8f5e9", border: "none", color: "#2d5a27", padding: "6px", borderRadius: "4px", cursor: "pointer" }}>✎</button>
              <button onClick={() => { if(confirm("Supprimer ce traitement ?")) handleDelete(r.id); }} style={{ background: "#ffebee", border: "none", color: "#c62828", padding: "6px", borderRadius: "4px", cursor: "pointer" }}>🗑</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// REMPLACEMENT DE L'EXPORT CRITIQUÉ PAR LE CHARGEMENT DIRECT REACT 18
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MainApp />);

</script>
</body>
